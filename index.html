<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COCOSystem PM — 進捗・利益管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg: #F9FAFB;           /* gray-50 */
    --surface: #FFFFFF;
    --surface-2: #F1F2F5;
    --ink: #16202B;
    --ink-soft: #5B6B7A;
    --ink-faint: #93A0AC;
    --line: #E7E9EC;
    --brand: #7C3AED;        /* violet-600：メインアクセント(紫) */
    --brand-dark: #6D28D9;
    --brand-tint: #F0EBFE;
    --profit: #059669;       /* エメラルドグリーン系：利益グラフ用に統一 */
    --profit-tint: #D1FAE5;
    --warn: #B58900;         /* 黄（期日3日以内）※維持 */
    --warn-tint: #FBF1CC;
    --danger: #C1443B;       /* 赤（期日超過・当日）※維持 */
    --danger-tint: #FBE7E5;
    --rail-done: #059669;
    --rail-current: #7C3AED;
    --rail-future: #DEE1E6;
    --rail-ongoing: #6B4FA0;
    --cost-other: #1D4ED8;   /* ブルー系の濃淡で統一：①原価(最も濃い) */
    --cost-shimura: #3B82F6; /* ②志村さん(中間) */
    --cost-jin: #93C5FD;     /* ③JIN(最も薄い) */
    --font-display: 'Space Grotesk', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; width:100%; overflow-x:hidden;}
  body{
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #app{display:flex; min-height:100vh; width:100%; max-width:100%;}
  .icon{ vertical-align:-3px; flex-shrink:0; }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width: 232px; flex-shrink:0;
    background: var(--ink);
    color: #fff;
    display:flex; flex-direction:column;
    padding: 22px 16px;
  }
  .brand{
    font-family: var(--font-display);
    font-weight:700; font-size:17px; letter-spacing:0.2px;
    display:flex; align-items:center; gap:9px;
    padding: 4px 6px 22px 6px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 18px;
  }
  .brand-mark{
    width:26px; height:26px; border-radius:7px;
    background: linear-gradient(135deg, var(--brand) 0%, #A78BFA 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:#fff; flex-shrink:0;
  }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding: 10px 12px; border-radius:8px; cursor:pointer;
    font-size:14px; font-weight:500; color: rgba(255,255,255,0.68);
    margin-bottom:2px; transition: background .12s ease, color .12s ease;
  }
  .nav-item:hover{ background: rgba(255,255,255,0.06); color:#fff; }
  .nav-item.active{ background: rgba(124,58,237,0.38); color:#fff; box-shadow: inset 3px 0 0 var(--brand); }
  .sidebar-footer{ margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,0.1); }
  .new-case-btn{
    width:100%; display:flex; align-items:center; justify-content:center; gap:7px;
    padding: 10px 12px; border-radius:8px; border:none;
    background: var(--brand); color:#fff; font-size:13px; font-weight:600;
    cursor:pointer; font-family: var(--font-body);
  }
  .new-case-btn:hover{ background: var(--brand-dark); }
  .sidebar-footer .btn-ghost{ color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.22); font-size:12px; padding:8px 12px; }
  .sidebar-footer .btn-ghost:hover{ color:#fff; border-color: rgba(255,255,255,0.5); }

  /* ---------- Main ---------- */
  main{ flex:1; min-width:0; padding: 28px 36px 60px; max-width: 1180px; }
  .page-title{ font-family: var(--font-display); font-weight:700; font-size:22px; margin:0 0 3px; overflow-wrap:anywhere; display:flex; align-items:center; gap:9px; }
  .page-title .icon{ color: var(--brand); }
  .page-sub{ color:var(--ink-soft); font-size:13.5px; margin:0 0 24px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .intro-badge{
    display:inline-flex; align-items:center; gap:5px; background: var(--brand-tint); color:var(--brand-dark);
    font-weight:700; font-size:12px; padding:3px 10px; border-radius:20px;
  }
  .footnote{ font-size:11px; color:var(--ink-faint); margin:10px 0 0; }

  .card{ background: var(--surface); border:1px solid var(--line); border-radius:14px; padding: 20px 22px; min-width:0; }
  .grid-2{ display:grid; grid-template-columns: 1.55fr 1fr; gap:18px; align-items:start; }
  .grid-2 > div{ min-width:0; }

  /* KPI */
  .kpi-row{ display:grid; grid-template-columns: repeat(4,1fr); gap:14px; margin-bottom:18px; }
  .kpi{ border-radius:14px; padding:16px 18px; min-width:0; position:relative; overflow:hidden; }
  .kpi.kpi-plain{ background:var(--surface); border:1px solid var(--line); }
  .kpi.kpi-blue{ background: linear-gradient(135deg,#60A5FA,#22D3EE); box-shadow:0 10px 24px -10px rgba(34,211,238,0.55); }
  .kpi.kpi-green{ background: linear-gradient(135deg,#34D399,#10B981); box-shadow:0 10px 24px -10px rgba(16,185,129,0.5); }
  .kpi.kpi-pink{ background: linear-gradient(135deg,#FB923C,#F472B6); box-shadow:0 10px 24px -10px rgba(244,114,182,0.5); }
  .kpi-icon{ position:absolute; top:14px; right:14px; opacity:0.55; }
  .kpi .kpi-icon.icon{ color:#fff; }
  .kpi-plain .kpi-icon.icon{ color: var(--brand); opacity:0.8; }
  .kpi-label{ font-size:12px; font-weight:600; letter-spacing:.2px; margin-bottom:8px; color:var(--ink-soft); }
  .kpi-blue .kpi-label, .kpi-green .kpi-label, .kpi-pink .kpi-label{ color: rgba(255,255,255,0.88); }
  .kpi-value{ font-family: var(--font-mono); font-size:21px; font-weight:600; overflow-wrap:anywhere; color:var(--ink); }
  .kpi-blue .kpi-value, .kpi-green .kpi-value, .kpi-pink .kpi-value{ color:#fff; }
  .kpi-value.danger{ color: var(--danger); }

  h3.section-h{ font-family: var(--font-display); font-size:14.5px; font-weight:700; margin:0 0 14px; display:flex; align-items:center; gap:8px; }
  h3.section-h .icon{ color: var(--brand); }

  /* Chart */
  .chart-wrap{ overflow-x:auto; -webkit-overflow-scrolling:touch; width:100%; }
  .chart{ display:flex; align-items:flex-end; gap:18px; height:200px; padding: 6px 6px 0; min-width: max-content; }
  .chart-col{ display:flex; flex-direction:column; align-items:center; gap:6px; width:66px; flex-shrink:0; }
  .chart-bars{ display:flex; align-items:flex-end; gap:4px; height:150px; }
  .bar{ width:15px; border-radius:4px 4px 0 0; }
  .bar.revenue{ background: var(--brand-tint); border:1px solid var(--brand); border-bottom:none; }
  .bar.profit{ background: var(--profit); }
  .stack-bar{ width:15px; display:flex; flex-direction:column-reverse; border-radius:4px 4px 0 0; overflow:hidden; }
  .seg-other{ background: var(--cost-other); }
  .seg-shimura{ background: var(--cost-shimura); border-top:1px solid rgba(255,255,255,0.55); }
  .seg-jin{ background: var(--cost-jin); border-top:1px solid rgba(255,255,255,0.55); }
  .chart-month{ font-size:11px; color:var(--ink-soft); font-family:var(--font-mono); }
  .margin-badge{ font-family:var(--font-mono); font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:10px; }
  .margin-badge.good{ background:var(--profit-tint); color:var(--profit); }
  .margin-badge.ok{ background:var(--warn-tint); color:var(--warn); }
  .margin-badge.bad{ background:var(--danger-tint); color:var(--danger); }
  .chart-legend{ display:flex; gap:14px; margin-top:14px; font-size:12px; color:var(--ink-soft); flex-wrap:wrap; align-items:center; }
  .legend-dot{ width:9px; height:9px; border-radius:2px; display:inline-block; margin-right:5px; vertical-align:-1px;}

  .period-toggle{ display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .period-btn{
    background: var(--surface-2); border:1px solid var(--line); color:var(--ink-soft);
    font-size:12px; font-weight:700; padding:6px 12px; border-radius:20px; cursor:pointer; font-family:var(--font-body);
  }
  .period-btn:hover{ border-color: var(--brand); color: var(--brand); }
  .period-btn.active{ background: var(--brand); border-color: var(--brand); color:#fff; }
  .period-note{ font-size:11.5px; color:var(--ink-faint); margin-bottom:10px; }

  /* Alerts（期日超過=赤／3日以内=黄 は維持） */
  .alert-item{ display:flex; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); min-width:0; }
  .alert-item:last-child{ border-bottom:none; }
  .alert-main{ display:flex; gap:10px; align-items:flex-start; flex:1; min-width:0; cursor:pointer; }
  .alert-main:hover .alert-text{ color: var(--brand); }
  .alert-dot{ width:9px; height:9px; border-radius:50%; margin-top:5px; flex-shrink:0; }
  .alert-dot.danger{ background: var(--danger); box-shadow:0 0 0 3px var(--danger-tint); }
  .alert-dot.warning{ background: var(--warn); box-shadow:0 0 0 3px var(--warn-tint); }
  .alert-text{ font-size:13px; line-height:1.5; color: var(--ink); overflow-wrap:anywhere; min-width:0; }
  .alert-empty{ color: var(--ink-faint); font-size:13px; padding: 6px 0; }
  .alert-ok-btn{
    flex-shrink:0; display:inline-flex; align-items:center; gap:4px;
    background: var(--surface-2); border:1px solid var(--line); color:var(--ink-soft);
    font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:7px; cursor:pointer; font-family:var(--font-body);
  }
  .alert-ok-btn:hover{ background: var(--profit-tint); border-color:var(--profit); color:var(--profit); }

  /* Buttons */
  .btn-primary{
    display:inline-flex; align-items:center; gap:6px;
    background: var(--brand); color:#fff; border:none; padding:9px 15px; border-radius:8px;
    font-size:13.5px; font-weight:600; cursor:pointer; font-family:var(--font-body);
  }
  .btn-primary:hover{ background: var(--brand-dark); }
  .btn-primary:disabled{ background: var(--ink-faint); cursor:default; }
  .btn-ghost{
    display:inline-flex; align-items:center; gap:6px;
    background:transparent; color: var(--ink-soft); border:1px solid var(--line); padding:8px 13px;
    border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-body);
  }
  .btn-ghost:hover{ border-color: var(--brand); color: var(--brand); }
  .btn-danger-ghost{
    display:inline-flex; align-items:center; gap:6px;
    background:transparent; color: var(--danger); border:1px solid var(--danger-tint); padding:8px 13px;
    border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:var(--font-body);
  }
  .btn-small{
    display:inline-flex; align-items:center; gap:5px;
    background:transparent; color:var(--brand); border:1px solid var(--brand-tint); padding:5px 10px;
    border-radius:7px; font-size:11.5px; font-weight:700; cursor:pointer; font-family:var(--font-body); flex-shrink:0;
  }
  .btn-small:hover{ background: var(--brand-tint); }

  /* ---------- Filter accordion ---------- */
  .filter-toggle-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  .filter-toggle-btn{
    display:flex; align-items:center; gap:7px; background:transparent; border:1px solid var(--line);
    color:var(--ink); font-size:13px; font-weight:600; padding:8px 13px; border-radius:8px; cursor:pointer; font-family:var(--font-body);
  }
  .filter-toggle-btn:hover{ border-color:var(--brand); color:var(--brand); }
  .filter-toggle-btn .icon{ color:var(--brand); }
  .filter-badge{
    background: var(--brand); color:#fff; font-size:10.5px; font-weight:700; border-radius:10px; padding:1px 7px;
  }
  .filter-row{ display:grid; grid-template-columns: 2fr 1fr 1fr auto; gap:12px; align-items:end; margin-top:14px; }

  /* ---------- Case list (compact rows) ---------- */
  .case-list{ display:flex; flex-direction:column; }
  .case-row{ display:flex; align-items:center; gap:12px; padding:11px 4px; border-bottom:1px solid var(--line); min-width:0; }
  .case-row:last-child{ border-bottom:none; }
  .cr-name{
    flex:1 1 auto; min-width:0; font-weight:600; font-size:14px; cursor:pointer;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .cr-name:hover{ color:var(--brand); }
  .cr-status{
    flex-shrink:0; font-size:12px; color:var(--ink-soft); max-width:160px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .cr-status.ongoing{ color:var(--rail-ongoing); font-weight:700; }
  .cr-profit{ flex-shrink:0; font-family:var(--font-mono); font-weight:700; font-size:13.5px; min-width:88px; text-align:right; }
  .cr-profit.pos{ color:var(--profit); } .cr-profit.neg{ color:var(--danger); }

  /* Progress rail */
  .rail{ display:flex; overflow-x:auto; -webkit-overflow-scrolling:touch; padding: 6px 2px 4px; gap:0; width:100%; }
  .rail-step{ display:flex; flex-direction:column; align-items:center; min-width:96px; position:relative; cursor:pointer; }
  .rail-line{ position:absolute; top:11px; left:-50%; width:100%; height:2px; background:var(--rail-future); z-index:0;}
  .rail-step:first-child .rail-line{ display:none; }
  .rail-line.done{ background: var(--rail-done); }
  .rail-dot{
    width:23px; height:23px; border-radius:50%; background:var(--rail-future); z-index:1;
    display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff;
    border: 3px solid var(--bg);
  }
  .rail-dot.done{ background: var(--rail-done); }
  .rail-dot.current{ background: var(--rail-current); box-shadow: 0 0 0 4px var(--brand-tint); }
  .rail-dot.ongoing{ background: var(--rail-ongoing); box-shadow: 0 0 0 4px #EEE9F6; }
  .rail-label{ font-size:11px; text-align:center; margin-top:7px; color:var(--ink-soft); font-weight:500; max-width:92px; line-height:1.3; }
  .rail-step.done .rail-label, .rail-step.current .rail-label, .rail-step.ongoing .rail-label{ color: var(--ink); font-weight:600; }
  .rail-date{ font-size:10px; color:var(--ink-faint); font-family:var(--font-mono); margin-top:2px; }
  .rail-date.overdue{ color:var(--danger); font-weight:700; }
  .rail-date.soon{ color:var(--warn); font-weight:700; }

  /* Detail form */
  .detail-header{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px; gap:16px; flex-wrap:wrap; min-width:0; }
  .name-input{
    font-family:var(--font-display); font-size:22px; font-weight:700; border:none; background:transparent;
    padding:2px 0; border-bottom:1px solid transparent; width:340px; max-width:100%;
  }
  .name-input:focus{ outline:none; border-bottom:1px solid var(--brand); }
  .header-actions{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end; min-width:0; }
  .save-indicator{ font-size:11.5px; font-weight:600; color: var(--ink-faint); }
  .save-indicator.dirty{ color: var(--warn); }

  .field-row{ display:grid; grid-template-columns: repeat(3,1fr); gap:12px; margin-bottom:12px;}
  .field-row.two{ grid-template-columns: repeat(2,1fr); }
  .field{ display:flex; flex-direction:column; gap:5px; min-width:0; }
  .field label{ font-size:11.5px; font-weight:600; color:var(--ink-soft); display:flex; align-items:center; gap:5px; }
  .field label .icon{ color: var(--brand); opacity:0.85; }
  .field input, .field select{
    font-family: var(--font-body); font-size:13.5px; padding:8px 10px; border:1px solid var(--line);
    border-radius:7px; background:#fff; color:var(--ink); width:100%;
  }
  .field input[type=number], .field input[type=date]{ font-family: var(--font-mono); }
  .field input:focus, .field select:focus{ outline:none; border-color: var(--brand); box-shadow:0 0 0 3px var(--brand-tint); }

  .radio-group{ display:flex; gap:16px; margin-bottom: 6px; flex-wrap:wrap; }
  .radio-opt{ display:flex; align-items:center; gap:6px; font-size:13.5px; cursor:pointer; }
  .agency-check{
    display:flex; align-items:center; gap:8px; margin-top:10px; padding:10px 12px;
    background: var(--brand-tint); border-radius:8px; font-size:13px; color:var(--brand-dark); font-weight:600;
  }
  .agency-check.unsigned{ background: var(--danger-tint); color: var(--danger); }

  .plan-card{ border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:12px; background:#fbfbfd; min-width:0; }
  .plan-card-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px; }
  .plan-card-title{ font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .plan-card-title .icon{ color:var(--brand); }
  .plan-card-title .req-tag{ font-size:10px; font-weight:700; color:var(--brand); background:var(--brand-tint); padding:2px 6px; border-radius:5px; margin-left:3px; }
  .plan-profit-tag{ font-family:var(--font-mono); font-size:12.5px; font-weight:600; }
  .remove-opt{
    display:inline-flex; align-items:center; gap:4px; background:none; border:none; color:var(--ink-faint);
    cursor:pointer; font-size:12px; font-weight:600;
  }
  .remove-opt:hover{ color: var(--danger); }
  .setup-fee-block{ margin-top:6px; padding-top:12px; border-top:1px dashed var(--line); }
  .setup-fee-note{ font-size:12px; color:var(--ink-soft); margin-top:6px; }
  .autofill-note{ font-size:11px; color:var(--ink-faint); margin-top:-6px; margin-bottom:10px; display:flex; align-items:center; gap:5px; }
  .autofill-note .icon{ color: var(--brand); }

  .add-opt-row{ display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; }
  .add-opt-row select{ font-size:13px; padding:8px 10px; border:1px solid var(--line); border-radius:7px; }

  .totals-sticky{ position:sticky; top:20px; }
  .totals-line{ display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--line); gap:10px; }
  .totals-line:last-child{ border-bottom:none; }
  .totals-line .l{ font-size:13px; color:var(--ink-soft); font-weight:600; }
  .totals-line .v{ font-family:var(--font-mono); font-size:16px; font-weight:600; overflow-wrap:anywhere; text-align:right; }
  .totals-line.final .v{ font-size:21px; }
  .totals-line.final .l{ font-size:13.5px; color:var(--ink); }
  .v.pos{ color:var(--profit); } .v.neg{ color:var(--danger); }

  .account-box{ display:flex; gap:12px; flex-wrap:wrap; }
  .empty-state{ text-align:center; padding: 60px 20px; color:var(--ink-faint); }

  .log-row{ display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px solid var(--line); align-items:flex-start; min-width:0; }
  .log-row:last-child{ border-bottom:none; }
  .log-date{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); margin-right:8px; white-space:nowrap; }
  .log-text{ font-size:13px; line-height:1.5; overflow-wrap:anywhere; }
  .log-add-row{ display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .log-add-row input[type=date]{ width:150px; font-family:var(--font-mono); padding:8px 10px; border:1px solid var(--line); border-radius:7px; }
  .log-add-row input[type=text]{ flex:1; min-width:180px; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-family:var(--font-body); }

  /* Toast */
  #toast-host{ position:fixed; bottom:22px; right:26px; display:flex; flex-direction:column; gap:8px; z-index:999; max-width: calc(100vw - 40px); }
  .toast{
    background: var(--ink); color:#fff; padding:11px 16px; border-radius:9px; font-size:13px; font-weight:600;
    box-shadow: 0 8px 20px rgba(0,0,0,0.18); animation: toast-in .18s ease; overflow-wrap:anywhere;
    display:flex; align-items:center; gap:8px;
  }
  .toast .icon{ color: #34D399; }
  @keyframes toast-in{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }

  /* =========================================================
     RESPONSIVE — mobile-first adjustments (<=720px)
     ========================================================= */
  @media (max-width: 720px){
    #app{ flex-direction: column; }
    .sidebar{
      width:100%; flex-direction:row; align-items:center; padding:12px 14px; gap:6px;
      overflow-x:auto; -webkit-overflow-scrolling:touch;
    }
    .brand{ border-bottom:none; margin-bottom:0; padding:0; }
    .brand span:last-child{ display:none; }
    .sidebar-footer{ margin-top:0; padding-top:0; border-top:none; margin-left:auto; }
    .new-case-btn{ width:auto; white-space:nowrap; padding:9px 12px; }
    .nav-item{ margin-bottom:0; white-space:nowrap; }

    main{ padding: 16px 12px 40px; }
    .page-title{ font-size:19px; }

}

/* =========================================================
   DATE / FORMAT HELPERS
   ========================================================= */
const pad = n => String(n).padStart(2,'0');
const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseISO = s => { if(!s) return null; const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };
const addMonths = (d,n) => { const r = new Date(d); r.setMonth(r.getMonth()+n); return r; };
const lastDayOfMonth = d => new Date(d.getFullYear(), d.getMonth()+1, 0);
const firstDayOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);
const fmtDate = d => d ? `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}` : '—';
const fmtMoney = n => '¥' + Math.round(n||0).toLocaleString('ja-JP');
const fmtMonthLabel = key => { const [y,m] = key.split('-'); return `${y.slice(2)}/${m}`; };
const today = new Date(); today.setHours(0,0,0,0);
const deepClone = obj => JSON.parse(JSON.stringify(obj));

function nextMonthly20(from){
  let d = new Date(from.getFullYear(), from.getMonth(), 20);
  if(d < from) d = new Date(from.getFullYear(), from.getMonth()+1, 20);
  return d;
}
function computeDeadlines(kickoffISO){
  if(!kickoffISO) return null;
  const k = parseISO(kickoffISO);
  return {
    monthEnd: lastDayOfMonth(k),
    invoiceDate: firstDayOfMonth(addMonths(k,1)),
    firstPaymentDate: new Date(addMonths(k,1).getFullYear(), addMonths(k,1).getMonth(), 20),
    reportDate: new Date(k.getFullYear(), k.getMonth()+3, k.getDate()),
  };
}
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }

/* =========================================================
   永続化(localStorage) — GitHub Pages等の静的ホスティングでも
   ブラウザ内にデータが残るようにする。リロードしても消えない。
   ========================================================= */
const STORAGE_KEY = 'cocosystem_pm_cases_v1';
function loadCasesFromStorage(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : null;
  }catch(e){
    console.error('COCOSystem PM: 保存データの読み込みに失敗しました', e);
    return null;
  }
}
function saveCasesToStorage(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.cases));
  }catch(e){
    console.error('COCOSystem PM: 保存に失敗しました', e);
    showToast('保存に失敗しました（ブラウザのストレージ容量をご確認ください）');
  }
}

function showToast(msg){
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `${icon('check',15)} <span>${escapeHtml(msg)}</span>`;
  host.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .25s'; setTimeout(()=>el.remove(), 260); }, 2200);
}

/* =========================================================

   ========================================================= */
// index 0-11 = 事前確認〜3ヶ月後レポート提出確認 / index 12 = 契約中(継続)
const STEPS = [
  {key:'pre', label:'事前確認'},

const ONGOING_INDEX = STEPS.length - 1; // 12

// 標準料金表：プラン選択時にこの値を各入力欄へ自動セットする(JINさんの金額は対象外＝常に手入力)
const PLAN_PRICING = {

    'ハイプラン':   { setupFeeRevenue:50000, revenue:50000, costShimura:3000, costOther:9000 },

};
function applyPlanPricing(item){
  const pricing = (PLAN_PRICING[item.category] || {})[item.planType];
  if(!pricing) return;
  if('revenue' in pricing) item.revenue = pricing.revenue;
  if('costOther' in pricing) item.costOther = pricing.costOther;
  if('costShimura' in pricing) item.costShimura = pricing.costShimura;
  if('setupFeeRevenue' in pricing) item.setupFeeRevenue = pricing.setupFeeRevenue;
  // costJin(JINさん)・setupFeeCostは自動入力の対象外。常に手入力のまま。
}
function itemLabel(item){ return `${item.category}：${item.planType}`; }
function statusLabel(idx){ return STEPS[idx] ? STEPS[idx].label : STEPS[0].label; }
function statusFilterLabel(idx){
  if(idx===0) return '事前確認';
  if(idx===ONGOING_INDEX) return '契約中';
  return `${idx}. ${STEPS[idx].label}`;

/* =========================================================

const SEED_CASES = [
    {

/* =========================================================
   COMPUTATION HELPERS
   ========================================================= */
function caseLineItems(c){
  const items = [];
  if(c.basePlan) items.push(c.basePlan);
  (c.options||[]).forEach(o => items.push(o));
  return items;
}
function lineCost(item){ return (item.costOther||0)+(item.costShimura||0)+(item.costJin||0); }
function lineProfit(item){ return (item.revenue||0) - lineCost(item); }

function caseTotals(c){
  const items = caseLineItems(c);
  const monthlyRevenue = items.reduce((s,i)=>s+(i.revenue||0),0);
  const monthlyCost = items.reduce((s,i)=>s+lineCost(i),0);
  const setupRevenue = items.reduce((s,i)=>s+(i.setupFeeRevenue||0),0);
  const setupCost = items.reduce((s,i)=>s+(i.setupFeeCost||0),0);
  const revenue = monthlyRevenue + setupRevenue;
  const cost = monthlyCost + setupCost;
  return { revenue, cost, profit: revenue - cost, items, setupRevenue, setupCost };
}

function monthlyAggregate(cases){
  const map = {};
  const add = (key, revenue, costOther, costShimura, costJin) => {
    if(!map[key]) map[key] = {revenue:0, costOther:0, costShimura:0, costJin:0};
    map[key].revenue += revenue;
    map[key].costOther += costOther;
    map[key].costShimura += costShimura;
    map[key].costJin += costJin;
  };
  const todayKey = toISO(today).slice(0,7);
  cases.forEach(c => {
    const ongoing = c.currentStepIndex >= ONGOING_INDEX;
    caseLineItems(c).forEach(i => {
      if(!i.kickoffDate) return;
      const baseMonth = parseISO(i.kickoffDate);
      const baseKey = i.kickoffDate.slice(0,7);
      add(baseKey, i.revenue||0, i.costOther||0, i.costShimura||0, i.costJin||0);
      add(baseKey, i.setupFeeRevenue||0, i.setupFeeCost||0, 0, 0);
      if(ongoing){
        let cursor = new Date(baseMonth.getFullYear(), baseMonth.getMonth()+1, 1);
        while(toISO(cursor).slice(0,7) <= todayKey){
          add(toISO(cursor).slice(0,7), i.revenue||0, i.costOther||0, i.costShimura||0, i.costJin||0);
          cursor = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
        }
      }
    });
  });
  return Object.keys(map).sort().map(k => {
    const m = map[k];
    const cost = m.costOther + m.costShimura + m.costJin;
    return { month:k, revenue:m.revenue, costOther:m.costOther, costShimura:m.costShimura, costJin:m.costJin, cost, profit: m.revenue - cost };
  });
}
function sliceByPeriod(monthly, period){
  if(period === 'all') return monthly;
  return monthly.slice(-period);
}

function buildAllAlerts(cases){
  const alerts = [];
  cases.forEach(c => {
    if(c.contractType === '代理店' && !c.agencyContractSigned){
      alerts.push({ id:`${c.id}:agency`, level:'danger', caseId:c.id, text:`${c.customerName}：代理店契約書が未締結のため、次のステップに進めません` });
    }
    if(c.kickoffDate){
      const dl = computeDeadlines(c.kickoffDate);
      const checks = [
        {idx:7,  date: dl.monthEnd,        label:'月末経過連絡'},
        {idx:8,  date: dl.invoiceDate,     label:'請求書発行'},
        {idx:9,  date: dl.firstPaymentDate,label:'初回入金確認'},
        {idx:11, date: dl.reportDate,      label:'3ヶ月後レポート提出確認'},
      ];
      checks.forEach(ch => {
        if(c.currentStepIndex > ch.idx) return;
        const diff = Math.round((ch.date - today)/86400000);
        if(diff <= 0) alerts.push({ id:`${c.id}:${ch.label}:${toISO(ch.date)}`, level:'danger', caseId:c.id, text:`${c.customerName}：「${ch.label}」の期日${diff===0?'は本日です':'を過ぎています'}（期日 ${fmtDate(ch.date)}）` });
        else if(diff <= 3) alerts.push({ id:`${c.id}:${ch.label}:${toISO(ch.date)}`, level:'warning', caseId:c.id, text:`${c.customerName}：「${ch.label}」まで残り${diff}日（期日 ${fmtDate(ch.date)}）` });
      });
      if(c.currentStepIndex >= 10){
        const nm = nextMonthly20(today);
        const diffNm = Math.round((nm-today)/86400000);
        if(diffNm <= 3) alerts.push({ id:`${c.id}:monthly:${toISO(nm)}`, level: diffNm<=0?'danger':'warning', caseId:c.id, text:`${c.customerName}：毎月の支払確認（${fmtDate(nm)}）` });
      }
    }
  });
  const order = {danger:0, warning:1};
  return alerts.sort((a,b)=>order[a.level]-order[b.level]);
}
function visibleAlerts(cases){
  return buildAllAlerts(cases).filter(a => !state.dismissedAlerts.has(a.id));
}
function dismissAlert(id){ state.dismissedAlerts.add(id); }

function goTo(view){
  if(state.view === 'detail' && isDraftDirty()){

  }
  state.draft = null; state.isNewCase = false;

}

    <div class="sidebar">

        <button class="new-case-btn" id="btn-new-case">${icon('plus',15)} 新規案件を登録</button>
        <button class="btn-ghost" id="btn-reset-data" style="width:100%; margin-top:8px; justify-content:center;">初期データにリセット</button>
      </div>
    </div>
    <main id="main"></main>
  `;
  document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => goTo(el.dataset.nav)));
  document.getElementById('btn-new-case').addEventListener('click', () => {
    if(state.view === 'detail' && isDraftDirty()){
      if(!confirm('保存されていない変更があります。破棄して新規案件を作成しますか？')) return;
    }
    createNewCase();
  });
  document.getElementById('btn-reset-data').addEventListener('click', () => {
    if(confirm('この端末に保存されているすべての案件データを削除し、サンプルデータに戻します。よろしいですか？（元に戻せません）')){
      state.cases = deepClone(SEED_CASES);
      saveCasesToStorage();
      state.draft = null; state.isNewCase = false;
      state.view = 'dashboard';
      render();
      showToast('サンプルデータにリセットしました');
    }
  });

  if(state.view === 'dashboard') renderDashboard();
  else if(state.view === 'list') renderList();
  else if(state.view === 'detail') renderDetail();
}

function createNewCase(){
  const basePlan = makeItem('基本(AIO)','ライトプラン','', 0,0,0,0);

/* =========================================================
   RENDER: DASHBOARD
   ========================================================= */
function marginClass(pct){
  if(pct >= 20) return 'good';
  if(pct >= 0) return 'ok';
  return 'bad';
}

function renderDashboard(){
  const main = document.getElementById('main');
  const allMonthly = monthlyAggregate(state.cases);
  const monthly = sliceByPeriod(allMonthly, state.dashboardPeriod);
  const alerts = visibleAlerts(state.cases);
  const totalProfit = allMonthly.reduce((s,m)=>s+m.profit,0);
  const thisMonthKey = toISO(today).slice(0,7);

  const hasDanger = alerts.some(a=>a.level==='danger');

  main.innerHTML = `

      <div class="card">
        <h3 class="section-h">${icon('trendingUp',16)} 月別 売上・原価・利益の推移</h3>
        <div class="period-toggle" id="period-toggle">
          ${[3,6,12,'all'].map(p => `
            <button class="period-btn ${state.dashboardPeriod===p?'active':''}" data-period="${p}">${p==='all'?'全期間':p+'ヶ月'}</button>
          `).join('')}
        </div>
        ${hiddenMonths > 0 ? `<div class="period-note">全${allMonthly.length}ヶ月分のうち直近${monthly.length}ヶ月分を表示中です。それ以前のデータは「全期間」に切り替えるか、グラフを横スクロールすると確認できます。</div>` : ''}
        ${monthly.length===0 ? `<div class="empty-state">まだ導入日のあるプランがありません</div>` : `
        <div class="chart-wrap" id="chart-wrap"><div class="chart">
          ${monthly.map(m => {
            const margin = m.revenue > 0 ? (m.profit / m.revenue) * 100 : 0;
            return `
            <div class="chart-col">
              <div class="chart-bars">
                <div class="bar revenue" style="height:${Math.max(4,(m.revenue/maxVal)*150)}px" title="売上 ${fmtMoney(m.revenue)}"></div>
                <div class="stack-bar" style="height:${Math.max(4,(m.cost/maxVal)*150)}px" title="原価 ${fmtMoney(m.costOther)} ／ 志村さん ${fmtMoney(m.costShimura)} ／ JIN ${fmtMoney(m.costJin)}">
                  <div class="seg-other" style="height:${(m.costOther/maxVal)*150}px"></div>
                  <div class="seg-shimura" style="height:${(m.costShimura/maxVal)*150}px"></div>
                  <div class="seg-jin" style="height:${(m.costJin/maxVal)*150}px"></div>
                </div>

            </div>

        </div></div>
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:var(--brand-tint);border:1px solid var(--brand)"></span>売上</span>
          <span><span class="legend-dot" style="background:var(--cost-other)"></span>原価</span>
          <span><span class="legend-dot" style="background:var(--cost-shimura)"></span>志村さん</span>

/* =========================================================
   RENDER: LIST
   ========================================================= */
function filteredCases(){
  const f = state.listFilters;
  const kw = f.keyword.trim().toLowerCase();
  return state.cases.filter(c => {
    if(f.contractType !== 'all' && c.contractType !== f.contractType) return false;
    if(f.status !== 'all' && String(c.currentStepIndex) !== f.status) return false;
    if(kw && !c.customerName.toLowerCase().includes(kw)) return false;
    return true;
  });
}
function activeFilterCount(){
  const f = state.listFilters;
  let n = 0;
  if(f.contractType !== 'all') n++;
  if(f.status !== 'all') n++;
  if(f.keyword.trim() !== '') n++;
  return n;
}
function introducedCount(){
  return state.cases.filter(c => c.currentStepIndex >= INTRODUCED_FROM_INDEX).length;
}

function renderList(){
  const main = document.getElementById('main');
  const fCount = activeFilterCount();
  main.innerHTML = `
    <div class="page-title">${icon('list',20)} 案件一覧</div>
    <div class="page-sub">
      <span>全 ${state.cases.length} 件</span>
      <span class="intro-badge">${icon('rocket',13)} 導入 ${introducedCount()} 件</span>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="filter-toggle-row">
        <button class="filter-toggle-btn" id="filter-toggle-btn">
          ${icon('filter',15)} 絞り込み ${fCount>0 ? `<span class="filter-badge">${fCount}</span>` : ''} ${state.listFilterOpen ? '▲' : '▼'}
        </button>
        ${fCount>0 ? `<button class="btn-ghost" id="filter-clear-inline">${icon('x',13)} 条件をクリア</button>` : ''}
      </div>
      ${state.listFilterOpen ? `
        <div class="filter-row">
          <div class="field">
            <label>${icon('search',13)} 店舗名・顧客名で検索</label>
            <input type="text" id="filter-keyword" placeholder="例：ベーカリー" value="${escapeAttr(state.listFilters.keyword)}" />
          </div>
          <div class="field">
            <label>契約形態</label>
            <select id="filter-contract">
              <option value="all">すべて</option>
              <option value="通常">通常</option>
              <option value="代理店">代理店</option>
              <option value="補助金">補助金</option>
            </select>
          </div>
          <div class="field">
            <label>現在のステータス</label>
            <select id="filter-status">
              <option value="all">すべて</option>
              ${STEPS.map((s,idx)=>`<option value="${idx}">${statusFilterLabel(idx)}</option>`).join('')}
            </select>
          </div>
          <button class="btn-ghost" id="filter-reset">条件をクリア</button>
        </div>
      ` : ''}
    </div>

    <div class="card">
      <div class="case-list" id="case-list"></div>
    </div>
  `;

  document.getElementById('filter-toggle-btn').addEventListener('click', ()=>{
    state.listFilterOpen = !state.listFilterOpen;
    renderList();
  });
  const clearInline = document.getElementById('filter-clear-inline');
  if(clearInline) clearInline.addEventListener('click', ()=>{
    state.listFilters = { contractType:'all', status:'all', keyword:'' };
    renderList();
  });

  if(state.listFilterOpen){
    document.getElementById('filter-contract').value = state.listFilters.contractType;
    document.getElementById('filter-status').value = state.listFilters.status;
    document.getElementById('filter-keyword').addEventListener('input', e=>{
      state.listFilters.keyword = e.target.value; renderCaseList();
    });
    document.getElementById('filter-contract').addEventListener('change', e=>{
      state.listFilters.contractType = e.target.value; renderCaseList();
    });
    document.getElementById('filter-status').addEventListener('change', e=>{
      state.listFilters.status = e.target.value; renderCaseList();
    });
    document.getElementById('filter-reset').addEventListener('click', ()=>{
      state.listFilters = { contractType:'all', status:'all', keyword:'' };
      renderList();
    });
  }

  renderCaseList();
}

function renderCaseList(){
  const host = document.getElementById('case-list');
  const rows = filteredCases();

  if(rows.length === 0){
    host.innerHTML = `<div class="empty-state">条件に一致する案件がありません</div>`;
    return;
  }

  host.innerHTML = rows.map(c => {
    const t = caseTotals(c);
    const ongoing = c.currentStepIndex >= ONGOING_INDEX;
    return `
      <div class="case-row">
        <span class="cr-name" data-open="${c.id}" title="${escapeAttr(c.customerName)}">${escapeHtml(c.customerName)}</span>
        <span class="cr-status ${ongoing?'ongoing':''}" title="${escapeAttr(statusLabel(c.currentStepIndex))}">${statusLabel(c.currentStepIndex)}</span>
        <span class="cr-profit ${t.profit>=0?'pos':'neg'}">${fmtMoney(t.profit)}</span>
        <button class="btn-small" data-dup="${c.id}">${icon('copy',12)} 複製</button>
      </div>
    `;
  }).join('');

  host.querySelectorAll('[data-open]').forEach(el => el.addEventListener('click', () => openDetail(el.dataset.open)));
  host.querySelectorAll('[data-dup]').forEach(el => {
    el.addEventListener('click', (e) => { e.stopPropagation(); duplicateCase(el.dataset.dup); });
  });
}

function duplicateCase(caseId){
  const orig = state.cases.find(c => c.id === caseId);
  if(!orig) return;
  // 導入日を含め、元の案件のすべての項目をそのまま複製する(id関連のみ重複回避のため採番し直す)
  const copy = deepClone(orig);
  copy.id = uid('case');
  copy.customerName = orig.customerName + '（コピー）';
  copy.basePlan.id = uid('item');
  copy.options = copy.options.map(o => ({ ...o, id: uid('item') }));
  copy.logs = (copy.logs || []).map(l => ({ ...l, id: uid('log') }));
  state.cases.unshift(copy);
  saveCasesToStorage();
  showToast(`「${orig.customerName}」を複製しました（導入日を含むすべての項目をそのままコピーしました）`);
  renderList();
}

/* =========================================================
   RENDER: DETAIL
   ========================================================= */
function isDraftDirty(){
  if(!state.draft) return false;
  if(state.isNewCase) return true;
  return JSON.stringify(state.draft) !== state.savedSnapshot;
}
function saveDraft(){
  if(state.isNewCase){
    state.cases.unshift(deepClone(state.draft));
    state.isNewCase = false;
  } else {
    const idx = state.cases.findIndex(c => c.id === state.draft.id);
    if(idx >= 0) state.cases[idx] = deepClone(state.draft);
  }
  state.savedSnapshot = JSON.stringify(state.draft);
  saveCasesToStorage();
  showToast('保存しました（このブラウザに記録されるため、リロードしても消えません）');
  renderDetail();
}
function updateSaveIndicator(){
  const el = document.getElementById('save-indicator');
  const btn = document.getElementById('btn-save');
  if(!el || !btn) return;
  const dirty = isDraftDirty();
  el.textContent = dirty ? '● 未保存の変更があります' : '✓ 保存済み';
  el.classList.toggle('dirty', dirty);
  btn.disabled = !dirty;
}

  main.innerHTML = `

            <button class="btn-primary" id="btn-add-log">${icon('plus',14)} 追加</button>
          </div>
        </div>

        <div class="card" style="margin-bottom:16px;">
          <h3 class="section-h">${icon('package',16)} 基本プラン（AIO）※必須</h3>

          </div>
          ${c.options.map(o => renderPlanCard(o, 'opt')).join('') || `<div class="alert-empty" style="margin-bottom:12px;">追加されているオプションはありません</div>`}

  const delBtn = document.getElementById('btn-delete');

    const item = makeItem(cat, defaultPlan, c.kickoffDate || '', 0,0,0,0);
    applyPlanPricing(item);
    c.options.push(item);
    renderDetail();
  });
}

function renderLogs(c){
  if(!c.logs || c.logs.length === 0) return `<div class="alert-empty">まだメモはありません</div>`;
  return c.logs.slice().sort((a,b)=> b.date.localeCompare(a.date)).map(l => `
    <div class="log-row">
      <div><span class="log-date">${l.date}</span><span class="log-text">${escapeHtml(l.text)}</span></div>
      <button class="remove-opt" data-remove-log="${l.id}">${icon('trash',12)} 削除</button>
    </div>
  `).join('');
}

        </div>
        <div class="field">
          <label>②志村さんへの報酬</label>
          <input type="number" step="1000" data-field="costShimura" data-item="${item.id}" value="${item.costShimura||0}" />
        </div>
        <div class="field">
          <label>③JINさんへの報酬</label>
          <input type="number" step="1000" data-field="costJin" data-item="${item.id}" value="${item.costJin||0}" />
        </div>
      </div>
      ${showSetup ? `
        <div class="setup-fee-block">
          <div class="field-row two">
            <div class="field">
              <label>初期費用（単発・導入月のみ計上）— 売上金額</label>
              <input type="number" step="1000" data-field="setupFeeRevenue" data-item="${item.id}" value="${item.setupFeeRevenue||0}" />
            </div>
            <div class="field">
              <label>初期費用 — ①原価（実費など）</label>
              <input type="number" step="1000" data-field="setupFeeCost" data-item="${item.id}" value="${item.setupFeeCost||0}" />
            </div>
          </div>
          <div class="setup-fee-note" data-setup-profit="${item.id}">
            初期費用の利益：${fmtMoney((item.setupFeeRevenue||0)-(item.setupFeeCost||0))}（志村さん・JINさんへの報酬は初期費用には発生しません）
          </div>
        </div>
      ` : `<div class="setup-fee-note" style="margin-top:8px;">AI広告は月額のみのサービスのため、初期費用はありません。</div>`}
    </div>
  `;
}

function findItemById(c, itemId){
  if(c.basePlan.id === itemId) return c.basePlan;
  return c.options.find(o => o.id === itemId);
}

function bindPlanCardEvents(c){
  document.querySelectorAll('[data-field][data-item]').forEach(el => {
    const evt = (el.tagName === 'SELECT') ? 'change' : (el.type === 'date' ? 'change' : 'input');
    el.addEventListener(evt, e => {
      const item = findItemById(c, el.dataset.item);
      if(!item) return;
      const field = el.dataset.field;

      if(field === 'planType'){
        item.planType = el.value;
        applyPlanPricing(item);
        renderDetail();
        return;
      }

      if(['revenue','costOther','costShimura','costJin','setupFeeRevenue','setupFeeCost'].includes(field)){
        item[field] = parseFloat(el.value) || 0;
      } else {
        item[field] = el.value;
      }
      const tag = document.querySelector(`[data-line-profit="${item.id}"]`);
      if(tag){
        const p = lineProfit(item);
        tag.textContent = `月額利益 ${fmtMoney(p)}`;
        tag.classList.toggle('pos', p>=0);
        tag.classList.toggle('neg', p<0);
      }
      if(field === 'setupFeeRevenue' || field === 'setupFeeCost'){
        const note = document.querySelector(`[data-setup-profit="${item.id}"]`);
        if(note) note.textContent = `初期費用の利益：${fmtMoney((item.setupFeeRevenue||0)-(item.setupFeeCost||0))}（志村さん・JINさんへの報酬は初期費用には発生しません）`;
      }
      renderTotals(c);
      updateSaveIndicator();
    });
  });
  document.querySelectorAll('[data-remove-opt]').forEach(btn => {
    btn.addEventListener('click', () => {
      c.options = c.options.filter(o => o.id !== btn.dataset.removeOpt);
      renderDetail();
    });
  });
}

function renderTotals(c){
  const panel = document.getElementById('totals-panel');
  const t = caseTotals(c);
  panel.innerHTML = `
    <h3 class="section-h">${icon('coins',16)} 損益サマリー（リアルタイム）</h3>
    <div class="totals-line"><span class="l">合計売上（月額＋初期費用）</span><span class="v">${fmtMoney(t.revenue)}</span></div>
    <div class="totals-line"><span class="l">合計原価（月額＋初期費用）</span><span class="v">${fmtMoney(t.cost)}</span></div>
    <div class="totals-line final"><span class="l">最終利益</span><span class="v ${t.profit>=0?'pos':'neg'}">${fmtMoney(t.profit)}</span></div>
    <div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line);">
      <div class="page-sub" style="margin:0 0 8px;">内訳</div>
      ${t.items.map(i => `
        <div style="display:flex; justify-content:space-between; font-size:12.5px; padding:4px 0; color:var(--ink-soft);">
          <span>${itemLabel(i)}（月額）</span>
          <span style="font-family:var(--font-mono);">${fmtMoney(lineProfit(i))}</span>
        </div>
      `).join('')}
      ${t.items.filter(i => hasSetupFeeUI(i)).map(i => `
        <div style="display:flex; justify-content:space-between; font-size:12.5px; padding:4px 0; color:var(--ink-soft);">
          <span>${itemLabel(i)}：初期費用</span>
          <span style="font-family:var(--font-mono);">${fmtMoney((i.setupFeeRevenue||0)-(i.setupFeeCost||0))}</span>
        </div>
      `).join('')}
    </div>
    <div class="page-sub" style="margin-top:12px; padding-top:12px; border-top:1px solid var(--line);">
      入力内容はまだ確定していません。反映するには上部の「保存する」を押してください。
    </div>
  `;
}

function renderRail(c){
  const rail = document.getElementById('rail');
  const dl = c.kickoffDate ? computeDeadlines(c.kickoffDate) : null;
  const dateFor = idx => {
    if(idx===6) return c.kickoffDate ? parseISO(c.kickoffDate) : null;
    if(!dl) return null;
    if(idx===7) return dl.monthEnd;
    if(idx===8) return dl.invoiceDate;
    if(idx===9) return dl.firstPaymentDate;
    if(idx===10) return nextMonthly20(today);
    if(idx===11) return dl.reportDate;
    return null;
  };
  rail.innerHTML = STEPS.map((s, idx) => {
    const isOngoingStep = idx === ONGOING_INDEX;
    const status = idx < c.currentStepIndex ? 'done' : (idx === c.currentStepIndex ? (isOngoingStep ? 'ongoing' : 'current') : 'future');
    const date = dateFor(idx);
    let dateClass = '';
    if(date && status !== 'done' && !isOngoingStep){
      const diff = Math.round((date-today)/86400000);
      if(diff <= 0) dateClass = 'overdue'; else if(diff<=3) dateClass = 'soon';
    }
    return `
      <div class="rail-step ${status}" data-step-idx="${idx}">
        <div class="rail-line ${idx<=c.currentStepIndex && idx>0 ? 'done':''}"></div>
        <div class="rail-dot ${status}">${status==='done'?'✓':(isOngoingStep?'◎':(idx===0?'':idx))}</div>
        <div class="rail-label">${s.label}</div>
        ${date ? `<div class="rail-date ${dateClass}">${fmtDate(date)}</div>` : ''}
      </div>
    `;
  }).join('');

  rail.querySelectorAll('[data-step-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.stepIdx, 10);
      if(c.contractType === '代理店' && !c.agencyContractSigned && idx > 0){
        alert('代理店契約の締結確認が完了するまで、ステップ1以降には進めません。');
        return;
      }
      c.currentStepIndex = idx;
      renderRail(c);
      updateSaveIndicator();
    });
  });
}

/* =========================================================
   UTIL
   ========================================================= */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s); }

render();
</script>
</body>
